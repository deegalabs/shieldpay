name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm test
      - run: pnpm build

  zk:
    name: ZK (prove and verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node circuits/scripts/ci_prove_verify.mjs

  contracts:
    name: Soroban contracts (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            contracts/payment_verifier
            contracts/anchor_registry
      - run: cargo test --manifest-path contracts/payment_verifier/Cargo.toml
      - run: cargo test --manifest-path contracts/anchor_registry/Cargo.toml
